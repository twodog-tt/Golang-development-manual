site_name: Go 后端与区块链架构师面试手册
site_description: 5年+ Go 后端 + Web3 架构师知识库 — 并发、系统设计、Solidity、链上工程
site_url: https://twodog-tt.github.io/Golang-development-manual/
repo_url: https://github.com/twodog-tt/Golang-development-manual
repo_name: twodog-tt/Golang-development-manual

docs_dir: docs
site_dir: site

theme:
  name: material
  language: zh
  palette:
    - scheme: default
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 深色模式
    - scheme: slate
      primary: teal
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 浅色模式
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.suggest
    - search.highlight
    - content.code.copy
    - toc.follow

extra_css:
  - stylesheets/extra.css

plugins:
  - awesome-pages
  - search:
      lang:
        - zh
        - en

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - toc:
      permalink: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/twodog-tt/Golang-development-manual
